data:
  manifest: data/scryfall/manifest.jsonl
  images_root: data/scryfall
  batch_size: 192
  shuffle_buffer: 1024
  min_release: "2008-01-01"
  # Fraction of train samples drawn from the synthetic renderer (v3+). 0.0
  # disables, typical range 0.3-0.5. Only applied to train split.
  synthetic_ratio: 0.0

model:
  input_height: 48
  input_width: 256
  num_classes: 45
  lstm_units: 96

train:
  epochs: 30
  lr: 5.0e-4            # lowered from 1e-3 — safer for CTC convergence
  warmup_steps: 1000    # extended warmup — CTC loss lands in a cleaner basin
  seed: 0
  output_dir: artifacts/bottom_region_v1
